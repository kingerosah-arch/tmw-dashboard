            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // File icon mapping
        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const icons = {
                'md': '📄', 'txt': '📄',
                'xlsx': '📊', 'xls': '📊', 'csv': '📊',
                'docx': '📝', 'doc': '📝',
                'pdf': '📋',
                'html': '🌐', 'htm': '🌐',
                'zip': '📦', 'gz': '📦', 'tar': '📦',
                'png': '🖼️', 'jpg': '🖼️', 'jpeg': '🖼️', 'gif': '🖼️', 'svg': '🖼️',
                'py': '🐍', 'js': '⚡', 'ts': '⚡', 'dart': '🎯',
                'json': '📋', 'yaml': '📋', 'yml': '📋',
            };
            return icons[ext] || '📄';
        }

        function getDeptClass(dept) {
            const map = {
                'Operations': 'dept-operations', 'Product': 'dept-product',
                'Engineering': 'dept-engineering', 'Design': 'dept-design',
                'Finance': 'dept-finance', 'Legal': 'dept-legal',
                'Marketing': 'dept-marketing', 'Sales': 'dept-sales',
                'Strategy': 'dept-strategy', 'People': 'dept-people',
                'Archive': 'dept-archive', 'Customer Success': 'dept-customer',
            };
            return map[dept] || '';
        }

        function renderNode(node, depth, path) {
            const isRoot = node.name === 'TrackMyWings';
            const currentPath = isRoot ? node.name : path + '/' + node.name;
            let html = '';

            if (isRoot) {
                html += '<div class="tree-children visible">';
                node.children.forEach(child => { html += renderNode(child, depth + 1, currentPath); });
                html += '</div>';
            } else {
                const id = 'node-' + Math.random().toString(36).substr(2, 9);
                const hasChildren = node.children && node.children.length > 0;

                html += `<div class="tree-node" data-name="${node.name.toLowerCase()}" data-path="${currentPath.toLowerCase()}">
                    <div class="tree-item">
                        <div class="tree-toggle ${!hasChildren ? 'hidden' : ''}" onclick="toggleNode('${id}')">
                            <span id="toggle-${id}">▶</span>
                        </div>
                        <div class="tree-icon">
                            ${node.type === 'folder' ? '📁' : getFileIcon(node.name)}
                        </div>
                        <div class="tree-name ${node.type === 'folder' ? 'folder' : ''}">
                            ${node.name}
                        </div>
                        ${node.dept && node.dept !== 'root' ? `<span class="dept-badge ${getDeptClass(node.dept)}">${node.dept}</span>` : ''}
                    </div>
                    ${hasChildren ? `<div class="tree-children" id="${id}">
                        ${node.children.map(child => renderNode(child, depth + 1, currentPath)).join('')}
                    </div>` : ''}
                </div>`;
            }
            return html;
        }

        function toggleNode(nodeId) {
            const el = document.getElementById(nodeId);
            const toggle = document.getElementById('toggle-' + nodeId);
            if (el.classList.contains('visible')) {
                el.classList.remove('visible');
                toggle.parentElement.classList.remove('open');
            } else {
                el.classList.add('visible');
                toggle.parentElement.classList.add('open');
            }
        }

        function expandAll() {
            document.querySelectorAll('.tree-children').forEach(el => el.classList.add('visible'));
            document.querySelectorAll('.tree-toggle').forEach(el => el.classList.add('open'));
        }

        function collapseAll() {
            document.querySelectorAll('.tree-children').forEach(el => {
                if (!el.parentElement.classList.contains('fm-tree')) el.classList.remove('visible');
            });
            document.querySelectorAll('.tree-toggle').forEach(el => el.classList.remove('open'));
            // Keep top-level visible
            document.querySelector('.fm-tree > .tree-children').classList.add('visible');
        }

        function filterTree(query) {
            const q = query.toLowerCase().trim();
            const allNodes = document.querySelectorAll('.tree-node');

            if (!q) {
                allNodes.forEach(n => n.classList.remove('search-hidden'));
                collapseAll();
                return;
            }

            allNodes.forEach(node => {
                const name = node.getAttribute('data-name') || '';
                const path = node.getAttribute('data-path') || '';
                if (name.includes(q) || path.includes(q)) {
                    node.classList.remove('search-hidden');
                    // Expand parents
                    let parent = node.parentElement;
                    while (parent) {
                        if (parent.classList.contains('tree-children')) {
                            parent.classList.add('visible');
                            const toggle = document.getElementById('toggle-' + parent.id);
                            if (toggle) toggle.parentElement.classList.add('open');
                        }
                        parent = parent.parentElement;
                    }
                } else {
                    // Hide only if no children match
                    const childMatch = node.querySelector('.tree-node:not(.search-hidden)');
                    if (!childMatch) node.classList.add('search-hidden');
                }
            });

            // Second pass: unhide parents of visible nodes
            allNodes.forEach(node => {
                if (!node.classList.contains('search-hidden')) {
                    let parent = node.parentElement.closest('.tree-node');
                    while (parent) {
                        parent.classList.remove('search-hidden');
                        parent = parent.parentElement.closest('.tree-node');
                    }
                }
            });
        }

        // Render on load
        document.getElementById('folderTree').innerHTML = renderNode(folderStructure, 0, '');
